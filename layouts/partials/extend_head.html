{{- /* partial "theme_lab_head.html" . */ -}}

<style>
/* ── Theme Variables ── */
:root {
  --pt-accent-dark: #16A34A;
  --pt-accent: #22C55E;
  --pt-accent-light: #4ADE80;
  --pt-accent-rgb: 34, 197, 94;
  --pt-accent-light-rgb: 74, 222, 128;
  --theme: #0B1220;
  --entry: #132035;
  --primary: #F8FAFC;
  --secondary: #CBD5E1;
  --content: #F8FAFC;
  --border: #1E3050;
  --tertiary: #1E3050;
}

/* ── Profile image: glowing ring ── */
.profile_inner img {
  border-radius: 50%;
  box-shadow:
    0 0 0 3px var(--pt-accent),
    0 0 25px rgba(var(--pt-accent-rgb), 0.5),
    0 0 60px rgba(var(--pt-accent-rgb), 0.2);
  animation: avatar-glow 3s ease-in-out infinite;
  transition: transform 0.3s ease;
}
.profile_inner img:hover {
  transform: scale(1.06);
}
@keyframes avatar-glow {
  0%, 100% {
    box-shadow: 0 0 0 3px var(--pt-accent), 0 0 25px rgba(var(--pt-accent-rgb),.5), 0 0 60px rgba(var(--pt-accent-rgb),.2);
  }
  50% {
    box-shadow: 0 0 0 3px var(--pt-accent-light), 0 0 35px rgba(var(--pt-accent-light-rgb),.6), 0 0 70px rgba(var(--pt-accent-rgb),.3);
  }
}

/* ── Gradient name ── */
.profile_inner h1 {
  background: linear-gradient(135deg, var(--pt-accent-dark) 0%, var(--pt-accent) 50%, var(--pt-accent-light) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  font-size: clamp(2rem, 5vw, 2.6rem);
  margin-bottom: 0.15rem;
}

/* ── Typewriter line ── */
#typewriter-line {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0;
  font-size: 1.05rem;
  min-height: 1.8em;
  color: var(--secondary);
  margin-bottom: 0.5rem;
}
#typewriter-text {
  color: var(--pt-accent);
  font-weight: 500;
}
#typewriter-cursor {
  display: inline-block;
  color: var(--pt-accent-light);
  font-weight: 300;
  animation: cursor-blink 0.7s step-end infinite;
  margin-left: 1px;
}
@keyframes cursor-blink {
  50% { opacity: 0; }
}

/* ── Tech stack badges ── */
.tech-stack {
  display: flex;
  flex-wrap: wrap;
  gap: 0.45rem;
  justify-content: center;
  margin: 0.9rem 0 0.4rem;
  max-width: 480px;
  list-style: none;
  padding: 0;
}
.tech-badge {
  background: rgba(var(--pt-accent-rgb), 0.08);
  border: 1px solid rgba(var(--pt-accent-rgb), 0.28);
  color: var(--pt-accent-light);
  border-radius: 9999px;
  padding: 0.22rem 0.72rem;
  font-size: 0.77rem;
  font-weight: 500;
  transition: all 0.22s ease;
  cursor: default;
  letter-spacing: 0.01em;
}
.tech-badge a {
  color: inherit;
  text-decoration: none;
  cursor: pointer;
}
.tech-badge:hover {
  background: rgba(var(--pt-accent-rgb), 0.18);
  border-color: rgba(var(--pt-accent-rgb), 0.6);
  transform: translateY(-2px);
  box-shadow: 0 4px 14px rgba(var(--pt-accent-rgb), 0.2);
}

/* ── Buttons ── */
.button {
  background: rgba(var(--pt-accent-rgb), 0.1) !important;
  border: 1px solid rgba(var(--pt-accent-rgb), 0.35) !important;
  border-radius: 8px;
  transition: all 0.25s ease !important;
}
.button:hover {
  background: rgba(var(--pt-accent-rgb), 0.22) !important;
  border-color: rgba(var(--pt-accent-rgb), 0.7) !important;
  box-shadow: 0 0 18px rgba(var(--pt-accent-rgb), 0.3) !important;
  transform: translateY(-2px);
}

/* ── Social icons: subtle glow on hover ── */
.social-icons a {
  transition: transform 0.2s ease;
}
.social-icons a:hover {
  transform: scale(1.18);
}
.social-icons a:hover svg {
  filter: drop-shadow(0 0 5px rgba(var(--pt-accent-rgb), 0.65));
}

/* ── Blog list: page header ── */
body.list .page-header h1 {
  background: linear-gradient(135deg, var(--pt-accent-dark) 0%, var(--pt-accent) 50%, var(--pt-accent-light) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* ── Blog list: cards ── */
body.list .post-entry {
  border: 1px solid rgba(255, 255, 255, 0.06);
  border-left: 3px solid var(--pt-accent);
  border-radius: 10px;
  background: rgba(255, 255, 255, 0.02);
  padding: 1.2rem 1.5rem;
  transition: all 0.25s ease;
  margin-bottom: 1rem;
}
body.list .post-entry:hover {
  background: rgba(var(--pt-accent-rgb), 0.05);
  border-color: rgba(var(--pt-accent-rgb), 0.25);
  border-left-color: var(--pt-accent-light);
  transform: translateX(5px);
  box-shadow: 0 4px 24px rgba(var(--pt-accent-rgb), 0.08);
}
body.list .entry-header h2 {
  font-size: 1.1rem;
  transition: color 0.2s ease;
}
body.list .post-entry:hover .entry-header h2 {
  color: var(--pt-accent);
}
body.list .entry-content p {
  font-size: 0.9rem;
  line-height: 1.65;
  color: var(--secondary);
  margin: 0.4rem 0 0;
}
body.list .entry-footer {
  font-size: 0.76rem;
  opacity: 0.45;
  margin-top: 0.6rem;
}

/* ── Homepage bio ── */
.profile-bio {
  max-width: 560px;
  margin: 1.1rem auto 0;
  text-align: left;
  font-size: 0.9rem;
  line-height: 1.7;
  color: var(--secondary);
}
.profile-bio p {
  margin: 0 0 0.75rem;
}
.profile-bio p:last-child {
  margin-bottom: 0;
}

/* ── Mobile overrides ── */
@media (max-width: 640px) {
  .logo a {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 58vw;
    font-size: 0.8rem;
    display: inline-block;
  }
  .profile {
    padding: 1.5rem 0;
  }
  .profile_inner {
    gap: 0.4rem;
  }
  .profile_inner h1 {
    font-size: clamp(1.6rem, 8vw, 2.2rem);
  }
  #typewriter-line {
    font-size: 0.95rem;
    max-width: 100%;
    overflow: hidden;
    white-space: nowrap;
  }
  .tech-stack {
    max-width: 100%;
    gap: 0.35rem;
  }
  .tech-badge {
    font-size: 0.72rem;
    padding: 0.2rem 0.6rem;
  }
  .buttons {
    flex-wrap: wrap;
    justify-content: center;
    gap: 0.5rem;
  }
  body.list .post-entry {
    padding: 1rem 1rem 1rem 0.85rem;
    border-radius: 8px;
  }
  body.list .post-entry:hover {
    transform: none;
  }
  body.list .entry-header h2 {
    font-size: 1rem;
  }
  body.list .entry-content p {
    font-size: 0.85rem;
  }
}
</style>
