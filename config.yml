baseURL: "https://pranavgore09.github.io/"
title: "Pranav Gore | Senior Backend Engineer"
paginate: 5
theme: PaperMod

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

# googleAnalytics: UA-123-45

minify:
  disableXML: true
  minifyOutput: true

params:
  env: production # to enable google analytics, opengraph, twitter-cards and schema.
  title: Pranav Gore
  description: "Software Engineer with 12+ years building backend systems. Python, Django, PostgreSQL, Redis, AWS, FFmpeg/HLS video pipelines, Terraform, GitHub Actions CI/CD. Founding engineer at Avoma and Privyr."
  keywords: [Software Engineer, Backend Engineer, Python, Django, DRF, PostgreSQL, Redis, AWS, FFmpeg, HLS, Terraform, GitHub Actions, Jenkins, CloudFormation, JavaScript, Portfolio, Resume, Pranav Gore]
  author: "Pranav Gore"
  images: ["/img/profile4_small.png"]
  DateFormat: "January 2, 2006"
  defaultTheme: dark # auto, dark, light
  disableThemeToggle: true

  ShowReadingTime: false
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: false
  disableSpecial1stPost: false
  disableScrollToTop: false
  comments: false
  hidemeta: false
  hideSummary: false
  showtoc: false
  tocopen: false

  assets:
    # disableHLJS: true # to disable highlight.js
    # disableFingerprinting: true
    favicon: "/favicon/favicon.ico"
    favicon16x16: "/favicon/favicon-16x16.png"
    favicon32x32: "/favicon/favicon-32x32.png"
    apple_touch_icon: "/favicon/apple-touch-icon.png"

  # profile-mode
  profileMode:
    enabled: true # needs to be explicitly set
    title: Pranav Gore
    subtitle: "Senior Backend Engineer, Python / Django / AWS, 12+ years"
    imageUrl: "/img/profile4_small.png"
    imageWidth: 130
    imageHeight: 130
    imageTitle: Pranav Gore
    buttons:
      - name: Now
        url: now
      - name: Blogs
        url: blogs
      - name: About
        url: about
      - name: Resume
        url: /pdf/PranavGoreResume2026.pdf

  # home-info mode
  homeInfoParams:
    Title: "Hi there \U0001F44B"
    Content: Welcome to my portfolio

  socialIcons:
    - name: github
      url: "https://github.com/pranavgore09?tab=overview&from=2017-12-01&to=2017-12-31"
    - name: stackoverflow
      url: "https://stackoverflow.com/users/1776087/pranav"
    - name: linkedin
      url: "https://www.linkedin.com/in/pranavgore/"
    - name: medium
      url: "https://medium.com/@pranavgore09"
    - name: twitter
      url: "https://twitter.com/pranavgore09"
    

  analytics:
    google:
      SiteVerificationTag: "Tg_WudYwZi8MQ2dsdV9OwqnF9mIdvEWt1kSMycY3JO4"

  cover:
    hidden: true # hide everywhere but not in structured data
    hiddenInList: true # hide on list pages and home
    hiddenInSingle: true # hide on single page

  # editPost:
  #   URL: "https://github.com/<path_to_repo>/content"
  #   Text: "Suggest Changes" # edit text
  #   appendFilePath: false # to append file path to Edit link

  # for search
  # https://fusejs.io/api/options.html
  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys: ["title", "permalink", "summary", "content"]
menu:
  main:
    - identifier: now
      name: now
      url: /now/
      weight: 5
    - identifier: about
      name: about
      url: /about/
      weight: 10
    - identifier: contact
      name: contact
      url: /contact/
      weight: 20
